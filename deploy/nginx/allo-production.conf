# Allo 生产环境 Nginx 配置
# 放置于 /etc/nginx/sites-available/allo
# 软链接到 /etc/nginx/sites-enabled/allo

# 上游服务定义
upstream frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream gateway {
    server 127.0.0.1:8001;
    keepalive 32;
}

upstream langgraph {
    server 127.0.0.1:2024;
    keepalive 32;
}

# HTTP 服务器（第一版）
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # 服务器名称（后续配置域名后修改）
    server_name _;
    
    # 客户端请求体大小限制
    client_max_body_size 50M;
    
    # 日志
    access_log /var/log/nginx/allo-access.log;
    error_log /var/log/nginx/allo-error.log warn;
    
    # ==========================================
    # 内部认证端点（供 auth_request 使用）
    # ==========================================
    location = /internal/auth-check {
        internal;
        proxy_pass http://gateway/api/auth/check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # ==========================================
    # LangGraph API（需要认证 + 注入 user_id）
    # ==========================================
    location /api/langgraph/ {
        # 认证检查
        auth_request /internal/auth-check;
        auth_request_set $auth_user_id $upstream_http_x_user_id;
        auth_request_set $auth_org_id $upstream_http_x_org_id;
        
        # 认证失败时返回 401
        error_page 401 = @auth_error;
        
        # 重写路径（去掉 /api/langgraph 前缀）
        rewrite ^/api/langgraph/(.*) /$1 break;
        
        # 代理到 LangGraph
        proxy_pass http://langgraph;
        
        # 注入用户上下文
        proxy_set_header X-User-Id $auth_user_id;
        proxy_set_header X-Org-Id $auth_org_id;
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE 流式支持（关键配置）
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        
        # 超时配置（流式请求可能很长）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # ==========================================
    # Gateway API（业务接口）
    # ==========================================
    location /api/ {
        proxy_pass http://gateway;
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # HTTP/1.1 支持
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # CORS 头（由 Gateway 处理，nginx 不重复添加）
    }
    
    # ==========================================
    # 前端静态资源和页面
    # ==========================================
    location / {
        proxy_pass http://frontend;
        
        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # HTTP/1.1 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # ==========================================
    # 健康检查端点（无需认证）
    # ==========================================
    location /health {
        proxy_pass http://gateway/health;
        access_log off;
    }
    
    # ==========================================
    # 认证错误处理
    # ==========================================
    location @auth_error {
        return 401 '{"error":"Unauthorized","message":"Please login first"}';
        add_header Content-Type application/json;
    }
}

